name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@elon')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@elon')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@elon')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@elon') || contains(github.event.issue.title, '@elon')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            When fixing any GitHub issue:
            1. Analyze the issue thoroughly
            2. Implement the fix
            3. Always create a Pull Request automatically — never wait for human confirmation
            4. Link the PR to the issue number in the PR description