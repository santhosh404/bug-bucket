name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Acknowledge issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **Claude is on it!** I've picked up this issue and am starting to work on it now. I'll post updates here as I make progress."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build prompt for new issue
        id: build-prompt
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo "A new GitHub issue #${{ github.event.issue.number }} has been opened: \"${{ github.event.issue.title }}\". Run 'gh issue view ${{ github.event.issue.number }}' to read the full details. Analyze the problem, implement a fix in the codebase, create a new branch, commit your changes, and open a pull request. Post progress updates as comments on issue #${{ github.event.issue.number }} as you work."
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ steps.build-prompt.outputs.prompt }}

          additional_permissions: |
            actions: read

          claude_args: >-
            --allowedTools
            "Bash(git checkout -b *)"
            "Bash(git add *)"
            "Bash(git commit *)"
            "Bash(git push *)"
            "Bash(gh pr create *)"
            "Bash(gh issue comment *)"

