name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        continue-on-error: true
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ secrets.APP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Acknowledge issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **Elon is on it!** I've picked up this issue and am starting to work on it now. I'll post updates here as I make progress."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Build prompt for new issue
        id: build-prompt
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo "A new GitHub issue #${{ github.event.issue.number }} has been opened: \"${{ github.event.issue.title }}\". Run 'gh issue view ${{ github.event.issue.number }}' to read the full details. Analyze the problem, implement a fix in the codebase, create a new branch, commit your changes, and open a pull request. Post progress updates as comments on issue #${{ github.event.issue.number }} as you work."
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.build-prompt.outputs.prompt }}
          show_full_output: true

          additional_permissions: |
            actions: read

