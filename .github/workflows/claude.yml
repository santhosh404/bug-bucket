name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            You are an automated bug-fixing assistant. When triggered by an issue:
            1. Analyze the issue description and understand the bug.
            2. Find the relevant code and implement the fix.
            3. Create a new branch named fix/issue-${{ github.event.issue.number }}-<short-description>.
            4. Commit your changes with a clear commit message referencing the issue.
            5. Open a pull request targeting the main branch with:
               - Title: "fix: <short description> (closes #${{ github.event.issue.number }})"
               - Body summarizing what was changed and why.
               - The PR body must include "Closes #${{ github.event.issue.number }}" so GitHub auto-closes the issue when the PR is merged.
            Use the `gh` CLI to create the branch, commit, and open the PR.

